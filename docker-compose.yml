
services:
  postgres:
    image: postgres:15-alpine
    container_name: bookit_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookit_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-bookit_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookit_admin} -d ${POSTGRES_DB:-bookit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: bookit_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secure_password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build: ./backend
    container_name: bookit_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bookit_admin}:${POSTGRES_PASSWORD:-secure_password_123}@postgres:5432/${POSTGRES_DB:-bookit_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secure_password}
      MINIO_BUCKET_CANTEENS: canteen-images
      MINIO_BUCKET_MENU: menu-images
      MINIO_SECURE: "false"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:5174}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: bookit_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_SERVER_IP: ${VITE_SERVER_IP:-localhost}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  admin:
    build: ./admin
    container_name: bookit_admin
    ports:
      - "5174:5174"
    environment:
      VITE_SERVER_IP: ${VITE_SERVER_IP:-localhost}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  postgres_data:
  minio_data:
